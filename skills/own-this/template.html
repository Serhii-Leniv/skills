<!DOCTYPE html>
<html lang="en"><!-- set lang="uk" for Ukrainian guides -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- Topic — Simple Study Guide --></title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a2129; --panel2: #212a35;
    --text: #d8dee6; --dim: #8a96a3; --accent: #58a6ff;
    --good: #56d364; --bad: #f85149; --warn: #e3b341;
    --code-bg: #14191f; --border: #30404f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 0 80px;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.7; font-size: 1.02em;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 24px; }
  header {
    background: linear-gradient(160deg, #1a2634, #10161d);
    border-bottom: 1px solid var(--border); padding: 44px 0 28px; margin-bottom: 28px;
  }
  h1 { font-size: 1.7em; margin: 0 0 8px; color: #fff; }
  .subtitle { color: var(--dim); }
  .subtitle a { color: var(--accent); text-decoration: none; }
  h2 {
    font-size: 1.4em; color: #fff; margin: 44px 0 14px;
    padding-bottom: 8px; border-bottom: 2px solid var(--border);
  }
  h2 .num { color: var(--accent); margin-right: 8px; }
  h3 { font-size: 1.1em; color: var(--accent); margin: 28px 0 8px; }
  p { margin: 12px 0; }
  code {
    font-family: Consolas, monospace; font-size: 0.88em;
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; color: #9ecbff;
  }
  pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 18px; overflow-x: auto;
    font-size: 0.85em; line-height: 1.55;
  }
  pre code { background: none; border: none; padding: 0; color: #c9d6e3; }
  .k { color: #ff7b72; } .s { color: #a5d6a5; } .c { color: #7d8896; font-style: italic; }
  .f { color: #d2a8ff; } .n { color: #79c0ff; }
  .box {
    border: 1px solid var(--border); border-left: 4px solid var(--accent);
    background: var(--panel); border-radius: 6px; padding: 14px 18px; margin: 18px 0;
  }
  .box.good { border-left-color: var(--good); }
  .box.bad { border-left-color: var(--bad); }
  .box.warn { border-left-color: var(--warn); }
  .box .title { font-weight: 600; margin-bottom: 6px; display: block; }
  .box.good .title { color: var(--good); }
  .box.bad .title { color: var(--bad); }
  .box.warn .title { color: var(--warn); }
  table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 0.92em; }
  th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  th { background: var(--panel2); color: #fff; }
  td { background: var(--panel); }
  .qa { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 4px 18px; margin: 12px 0; }
  .qa summary { cursor: pointer; font-weight: 600; padding: 10px 0; color: #fff; }
  .badge {
    display: inline-block; border-radius: 12px; padding: 2px 12px; font-size: 0.82em;
    border: 1px solid var(--border); background: var(--panel2); margin: 2px;
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1><!-- emoji + title: "Our X fix, explained simply" --></h1>
    <div class="subtitle"><!-- links: PR · issue · repo --></div>
  </div>
</header>

<div class="wrap">

<h2><span class="num">1.</span><!-- The context, with an analogy --></h2>
<!-- What the system is. ONE analogy carried through the whole doc.
     Table mapping analogy parts to real tables/modules.
     .box.good with THE single load-bearing fact.
     The problem as a NUMBERED STORY (ol). .box.bad with the user-visible result. -->

<h2><span class="num">2.</span><!-- What we do, in one idea --></h2>
<!-- .box.good: the fix in ONE sentence.
     ul: why that's obviously right (2-4 bullets).
     table: the key distinction (e.g. resolvable vs must-abort) and what we do for each. -->

<h2><span class="num">3.</span><!-- The tricky part / the twist --></h2>
<!-- Story of the subtlety or reviewer-caught flaw.
     .box.bad: "why that's poisonous" with the concrete bad outcome.
     .box.good: "the rule" that repairs it. One paragraph on the mechanism. -->

<h2><span class="num">4.</span><!-- Reading the actual code --></h2>
<!-- 3-5 <pre><code> blocks of FINAL shipped code with .k/.s/.c/.f spans and
     inline comments pointing at load-bearing lines.
     After EVERY block: <p><strong>Plain English:</strong> one-line translation.</p>
     End with the tests, narrated as arrange / act / assert. -->

<h2><span class="num">5.</span><!-- Mini-glossary --></h2>
<!-- One <details class="qa"><summary>term</summary><p>1-2 plain sentences</p></details>
     per term. Only terms actually used above. -->

<h2><span class="num">6.</span><!-- The 30-second version --></h2>
<div class="box">
  <p style="margin:6px 0">
  <!-- One quoted paragraph, speakable verbatim: problem → policy → subtlety → proof. -->
  </p>
</div>

<div class="box good" style="margin-top:32px">
  <span class="title">Status</span>
  <!-- one line: current state of the PR/work -->
</div>

</div>
</body>
</html>
