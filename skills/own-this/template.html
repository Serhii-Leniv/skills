<!DOCTYPE html>
<html lang="en"><!-- set lang="uk" for Ukrainian guides -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- Topic — Study Guide --></title>
<style>
  /* Light theme default; dark via prefers-color-scheme. Soft contrast both ways. */
  :root {
    --bg: #faf9f7; --panel: #ffffff; --panel2: #f0eee9;
    --text: #2a2f36; --dim: #6b7480; --accent: #2563c4;
    --good: #1a7f37; --good-bg: #f0f9f1; --bad: #c03030; --bad-bg: #fdf2f2;
    --warn: #9a6700; --code-bg: #f6f4ef; --border: #ddd8cf; --heading: #1a1f26;
    --k: #a12b6e; --s: #1a7f37; --c: #8a919c; --f: #6f42c1; --code-text: #33383f;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14181d; --panel: #1b2129; --panel2: #232b35;
      --text: #d3dae2; --dim: #8a96a3; --accent: #6cb0ff;
      --good: #56d364; --good-bg: #17251b; --bad: #f08080; --bad-bg: #2a1b1d;
      --warn: #e3b341; --code-bg: #10151a; --border: #323d49; --heading: #f0f4f8;
      --k: #ff7b9d; --s: #a5d6a5; --c: #7d8896; --f: #d2a8ff; --code-text: #c9d6e3;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 0 90px;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 17px; line-height: 1.7;
  }
  /* ~70ch measure for comfortable reading (50–75ch research range) */
  .wrap { max-width: 72ch; margin: 0 auto; padding: 0 24px; }

  header.hero {
    border-bottom: 1px solid var(--border);
    background: var(--panel); padding: 44px 0 24px;
  }
  h1 { font-size: 1.75em; line-height: 1.25; margin: 0 0 10px; color: var(--heading); }
  .subtitle { color: var(--dim); font-size: 0.95em; }
  .subtitle a { color: var(--accent); text-decoration: none; }

  /* Sticky Part nav = always-visible advance organizer */
  nav.parts {
    position: sticky; top: 0; z-index: 10;
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 8px 0; margin-bottom: 30px;
  }
  nav.parts .wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  nav.parts a {
    font-size: 0.8em; color: var(--dim); text-decoration: none;
    border: 1px solid var(--border); border-radius: 14px; padding: 3px 12px;
    background: var(--bg);
  }
  nav.parts a:hover { color: var(--accent); border-color: var(--accent); }

  h2 {
    font-size: 1.4em; color: var(--heading); margin: 52px 0 4px;
    padding-top: 10px; line-height: 1.3;
  }
  h2 .num {
    display: inline-block; background: var(--accent); color: var(--panel);
    border-radius: 6px; font-size: 0.7em; padding: 2px 10px;
    vertical-align: middle; margin-right: 10px;
  }
  /* Signaling: one line under every Part heading saying what you'll get */
  .lead { color: var(--dim); font-style: italic; margin: 2px 0 18px; }
  h3 { font-size: 1.1em; color: var(--accent); margin: 30px 0 8px; }
  p { margin: 13px 0; }

  code {
    font-family: Consolas, "Cascadia Code", monospace; font-size: 0.87em;
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; color: var(--code-text);
  }
  pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px; overflow-x: auto;
    font-size: 0.84em; line-height: 1.6;
  }
  pre code { background: none; border: none; padding: 0; color: var(--code-text); }
  .k { color: var(--k); } .s { color: var(--s); }
  .c { color: var(--c); font-style: italic; } .f { color: var(--f); }
  .plain { margin: -4px 0 20px; }
  .plain strong { color: var(--good); }

  .box {
    border: 1px solid var(--border); border-left: 4px solid var(--accent);
    background: var(--panel); border-radius: 8px; padding: 14px 18px; margin: 18px 0;
  }
  .box.good { border-left-color: var(--good); background: var(--good-bg); }
  .box.bad { border-left-color: var(--bad); background: var(--bad-bg); }
  .box .title { font-weight: 600; display: block; margin-bottom: 6px; color: var(--heading); }
  .box.good .title { color: var(--good); }
  .box.bad .title { color: var(--bad); }

  table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 0.92em; }
  th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; vertical-align: top; }
  th { background: var(--panel2); color: var(--heading); }
  td { background: var(--panel); }

  /* Part 0: concept cards (pre-training) */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; margin: 18px 0; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 15px; font-size: 0.92em;
  }
  .card .term { font-weight: 700; color: var(--accent); display: block; margin-bottom: 4px; }
  .card .why { color: var(--dim); font-size: 0.9em; display: block; margin-top: 6px; }

  /* Part 0: system map (dual coding) */
  .diagram {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin: 18px 0; font-size: 0.88em;
  }
  .diagram .nodebox {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; text-align: center;
  }
  .diagram .nodebox.hot { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent); }
  .diagram .arr { color: var(--dim); font-weight: 700; }
  .diagram .lbl { display: block; font-size: 0.8em; color: var(--dim); }

  /* Collapsibles: glossary + self-check answers */
  details.qa {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 4px 18px; margin: 10px 0;
  }
  details.qa summary { cursor: pointer; font-weight: 600; padding: 10px 0; color: var(--heading); }
  details.qa[open] { border-left: 3px solid var(--accent); }

  .badge {
    display: inline-block; border-radius: 12px; padding: 2px 12px; font-size: 0.8em;
    border: 1px solid var(--border); background: var(--panel2); margin: 2px;
  }
</style>
</head>
